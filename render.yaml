services:
  - type: web
    name: deephire-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # You will input this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: deephire-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd frontend && streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://deephire-backend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.9
