name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://prajwal0818:$HF_TOKEN@huggingface.co/spaces/prajwal0818/deep_hire HEAD:main --force || git push https://oauth2:$HF_TOKEN@huggingface.co/spaces/prajwal0818/deep_hire HEAD:main --force || git push https://prajwal8818:$HF_TOKEN@huggingface.co/spaces/prajwal8818/deep_hire HEAD:main --force || git push https://prajwal8818:$HF_TOKEN@huggingface.co/spaces/prajwal8818/prajwal0818 HEAD:main --force
